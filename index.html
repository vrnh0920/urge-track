<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>UrgeTrack — Neuro Symptom Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;width:100%;overflow:hidden;background:#030508;font-family:"DM Sans",sans-serif;color:#e2e8f5}
#neural-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.55}
.app{display:flex;height:100vh;width:100%;position:relative;z-index:1}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(59,130,246,0.3);border-radius:2px}

/* SIDEBAR */
.sidebar{width:64px;background:rgba(3,5,12,0.92);border-right:1px solid rgba(59,130,246,0.08);display:flex;flex-direction:column;align-items:center;padding:20px 0 16px;gap:2px;flex-shrink:0;z-index:20;position:relative}
.sidebar::after{content:"";position:absolute;right:0;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,transparent,rgba(59,130,246,0.25) 30%,rgba(139,92,246,0.25) 70%,transparent)}
.logo-wrap{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);display:flex;align-items:center;justify-content:center;margin-bottom:18px;flex-shrink:0;box-shadow:0 0 20px rgba(99,102,241,0.4)}
.nav-btn{width:42px;height:42px;border-radius:11px;border:none;background:transparent;color:#334155;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;position:relative;flex-shrink:0;margin-bottom:2px}
.nav-btn:hover{background:rgba(59,130,246,0.08);color:#60a5fa}
.nav-btn.on{background:linear-gradient(135deg,rgba(59,130,246,0.15),rgba(139,92,246,0.1));color:#60a5fa;box-shadow:0 0 12px rgba(59,130,246,0.15)}
.nav-btn.on::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:22px;background:linear-gradient(to bottom,#3b82f6,#8b5cf6);border-radius:0 2px 2px 0;box-shadow:2px 0 8px rgba(59,130,246,0.5)}

/* MAIN */
.main{flex:1;overflow-y:auto;overflow-x:hidden;position:relative}
.page{padding:30px 36px;min-height:100%;animation:pu .35s ease forwards}
@keyframes pu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* CARDS */
.glass{background:rgba(8,14,28,0.75);border:1px solid rgba(255,255,255,0.05);border-radius:16px;backdrop-filter:blur(16px);transition:border-color .25s,box-shadow .25s}
.glass:hover{border-color:rgba(59,130,246,0.18);box-shadow:0 0 30px rgba(59,130,246,0.04)}
.gcard{background:rgba(8,14,28,0.8);border-radius:16px;backdrop-filter:blur(16px);position:relative;overflow:hidden}
.gcard::before{content:"";position:absolute;inset:0;border-radius:16px;padding:1px;background:linear-gradient(135deg,rgba(59,130,246,0.25),rgba(139,92,246,0.1),rgba(20,184,166,0.1));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase}
.bb{background:rgba(59,130,246,0.1);color:#60a5fa;border:1px solid rgba(59,130,246,0.2)}
.bv{background:rgba(139,92,246,0.1);color:#a78bfa;border:1px solid rgba(139,92,246,0.2)}
.bt{background:rgba(20,184,166,0.1);color:#2dd4bf;border:1px solid rgba(20,184,166,0.2)}
.bg{background:rgba(16,185,129,0.1);color:#34d399;border:1px solid rgba(16,185,129,0.2)}

/* INPUTS */
.inp{background:rgba(5,10,20,0.9);border:1px solid rgba(255,255,255,0.07);color:#e2e8f5;font-family:"DM Sans",sans-serif;border-radius:10px;outline:none;transition:border-color .2s}
.inp:focus{border-color:rgba(59,130,246,0.5);box-shadow:0 0 0 3px rgba(59,130,246,0.08)}
.inp::placeholder{color:#1e3050}
.chip{padding:6px 14px;border-radius:22px;border:1px solid rgba(255,255,255,0.06);background:rgba(8,14,28,0.8);color:#475569;cursor:pointer;font-size:12px;font-family:"DM Sans",sans-serif;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:rgba(59,130,246,0.3);color:#60a5fa}
.chip.sel{background:rgba(59,130,246,0.12);color:#60a5fa;border-color:rgba(59,130,246,0.4);box-shadow:0 0 10px rgba(59,130,246,0.1)}

/* SEV BUTTONS */
.svb{width:36px;height:36px;border-radius:9px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:#475569;cursor:pointer;font-weight:700;font-size:13px;transition:all .15s;font-family:"DM Sans",sans-serif}
.svb:hover{color:#93c5fd;border-color:rgba(59,130,246,0.3)}
.sv1.on{background:rgba(16,185,129,0.15);color:#34d399;border-color:rgba(16,185,129,0.4);box-shadow:0 0 8px rgba(16,185,129,0.15)}
.sv2.on{background:rgba(20,184,166,0.15);color:#2dd4bf;border-color:rgba(20,184,166,0.4);box-shadow:0 0 8px rgba(20,184,166,0.15)}
.sv3.on{background:rgba(245,158,11,0.15);color:#fbbf24;border-color:rgba(245,158,11,0.4);box-shadow:0 0 8px rgba(245,158,11,0.15)}
.sv4.on{background:rgba(249,115,22,0.15);color:#fb923c;border-color:rgba(249,115,22,0.4);box-shadow:0 0 8px rgba(249,115,22,0.15)}
.sv5.on{background:rgba(239,68,68,0.15);color:#f87171;border-color:rgba(239,68,68,0.4);box-shadow:0 0 8px rgba(239,68,68,0.15)}

/* BUTTONS */
.btnp{background:linear-gradient(135deg,#2563eb,#7c3aed);border:none;color:white;font-family:"DM Sans",sans-serif;font-weight:600;cursor:pointer;border-radius:11px;transition:all .2s;box-shadow:0 4px 20px rgba(99,102,241,0.3)}
.btnp:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(99,102,241,0.45)}
.btnp:active{transform:translateY(0)}
.btnp:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btns{background:rgba(10,18,35,0.8);border:1px solid rgba(59,130,246,0.2);color:#60a5fa;font-family:"DM Sans",sans-serif;cursor:pointer;border-radius:9px;transition:all .2s}
.btns:hover{background:rgba(59,130,246,0.1);border-color:rgba(59,130,246,0.4)}

/* RANGE BUTTONS */
.rb{padding:5px 14px;border-radius:8px;font-size:11px;cursor:pointer;border:1px solid transparent;transition:all .2s;font-family:"DM Sans",sans-serif;font-weight:500}
.rb.ab{background:rgba(59,130,246,0.15);color:#60a5fa;border-color:rgba(59,130,246,0.3)}
.rb.ib{background:rgba(8,14,28,0.6);color:#334155}
.rb.av{background:rgba(139,92,246,0.15);color:#a78bfa;border-color:rgba(139,92,246,0.3)}
.rb.iv{background:rgba(8,14,28,0.6);color:#334155}
.rb.ag{background:rgba(16,185,129,0.15);color:#34d399;border-color:rgba(16,185,129,0.3)}
.rb.ig{background:rgba(8,14,28,0.6);color:#334155}
.rb.at{background:rgba(20,184,166,0.15);color:#2dd4bf;border-color:rgba(20,184,166,0.3)}
.rb.it{background:rgba(8,14,28,0.6);color:#334155}

/* METRIC CARDS */
.mcard{padding:22px 24px;position:relative;overflow:hidden}
.mcard::after{content:"";position:absolute;bottom:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.08;filter:blur(20px)}
.mtitle{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#334155;margin-bottom:12px}
.mval{font-family:"Syne",sans-serif;font-size:32px;font-weight:700;line-height:1}
.msub{font-size:11px;color:#334155;margin-top:7px}
.tabtn{padding:9px 20px;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .2s}

/* HERO */
.hero{border-radius:18px;overflow:hidden;position:relative;background:#030508;margin-bottom:24px}
.hero-img{width:100%;height:180px;object-fit:cover;opacity:.5;display:block}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(90deg,rgba(3,5,16,0.95) 35%,rgba(3,5,16,0.3) 100%)}
.hero-content{position:absolute;inset:0;display:flex;align-items:center;padding:32px}

/* ANIMATIONS */
@keyframes orb1{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-20px)}}
@keyframes orb2{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,30px)}}
@keyframes pulse-ring{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.4);opacity:0}}
input[type=range]{accent-color:#3b82f6;width:100%}
</style>

<body>
<canvas id="neural-bg"></canvas>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#334155;font-family:sans-serif;font-size:13px;flex-direction:column;gap:12px"><div style="width:36px;height:36px;border:2px solid rgba(59,130,246,0.3);border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite"></div><style>@keyframes spin{to{transform:rotate(360deg)}}</style>Initializing UrgeTrack…</div></div>

<!-- Neural canvas animation -->
<script>
(function(){
  var canvas = document.getElementById("neural-bg");
  var ctx = canvas.getContext("2d");
  var nodes = [];
  var N = 90;
  var DIST = 140;

  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}

  function init(){
    nodes=[];
    for(var i=0;i<N;i++){
      nodes.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        vx:(Math.random()-.5)*.25,
        vy:(Math.random()-.5)*.25,
        r:Math.random()*1.2+.4,
        c:Math.floor(Math.random()*3)
      });
    }
  }

  // colors from reference images: teal, blue, purple
  var baseColors=["14,184,166","59,130,246","139,92,246"];

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // connections
    for(var i=0;i<N;i++){
      for(var j=i+1;j<N;j++){
        var dx=nodes[i].x-nodes[j].x;
        var dy=nodes[i].y-nodes[j].y;
        var d=Math.sqrt(dx*dx+dy*dy);
        if(d<DIST){
          var a=(1-d/DIST)*0.35;
          ctx.strokeStyle="rgba("+baseColors[nodes[i].c]+","+a+")";
          ctx.lineWidth=0.6;
          ctx.beginPath();
          ctx.moveTo(nodes[i].x,nodes[i].y);
          ctx.lineTo(nodes[j].x,nodes[j].y);
          ctx.stroke();
        }
      }
    }
    // nodes
    for(var k=0;k<N;k++){
      var n=nodes[k];
      ctx.fillStyle="rgba("+baseColors[n.c]+",.7)";
      ctx.beginPath();
      ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
      ctx.fill();
    }
  }

  function update(){
    for(var i=0;i<N;i++){
      nodes[i].x+=nodes[i].vx;
      nodes[i].y+=nodes[i].vy;
      if(nodes[i].x<0||nodes[i].x>canvas.width) nodes[i].vx*=-1;
      if(nodes[i].y<0||nodes[i].y>canvas.height) nodes[i].vy*=-1;
    }
  }

  function loop(){update();draw();requestAnimationFrame(loop);}
  resize();init();loop();
  window.addEventListener("resize",function(){resize();init();});
})();
</script>

    h("div",{style:{borderRadius:14,overflow:"hidden",marginBottom:22,position:"relative",height:80}},
      h("img",{src:IMG_BRAIN,alt:"brain",style:{width:"100%",height:80,objectFit:"cover",objectPosition:"center 40%",opacity:.25,display:"block"}}),
      h("div",{style:{position:"absolute",inset:0,background:"linear-gradient(90deg,rgba(3,5,16,.95) 20%,rgba(3,5,16,.6) 100%)"}}),
      h("div",{style:{position:"absolute",inset:0,display:"flex",alignItems:"center",padding:"0 24px"}},
        h("div",{style:{color:"#334155",fontSize:12,lineHeight:1.6}},"Choose a technique to ground yourself.",h("br"),h("span",{style:{color:"#60a5fa"}},"CBIT-aligned. Clinically informed."))
      )
    ),
    h("div",{style:{display:"flex",gap:6,marginBottom:24}},
      tabs.map(function(t){
        var on=tool===t.id;
        return h("button",{key:t.id,className:"tabtn",onClick:function(){setTool(t.id);stopBreath();setGStep(0);setGAns({});},style:{border:"1px solid "+(on?"rgba(59,130,246,0.35)":"rgba(255,255,255,0.05)"),background:on?"rgba(59,130,246,0.12)":"rgba(8,14,28,0.7)",color:on?"#60a5fa":"#475569"}},t.label);
      })
    ),

    tool==="breathing"&&h("div",{className:"gcard",style:{padding:"44px 32px",textAlign:"center"}},
      h("div",{style:{fontFamily:"Syne",fontWeight:700,fontSize:18,color:"#e2e8f5",marginBottom:5}},"4-4-6 Breathing"),
      h("div",{style:{color:"#334155",fontSize:12,marginBottom:44}},"Activates parasympathetic response · reduces tic urge intensity"),
      h("div",{style:{position:"relative",width:200,height:200,margin:"0 auto 44px",display:"flex",alignItems:"center",justifyContent:"center"}},
        phase!=="idle"&&h("div",{style:{position:"absolute",inset:0,borderRadius:"50%",border:"1px solid rgba(59,130,246,0.2)",animation:"pulse-ring 3s ease-out infinite"}}),
        phase!=="idle"&&h("div",{style:{position:"absolute",inset:-24,borderRadius:"50%",border:"1px solid rgba(139,92,246,0.1)",animation:"pulse-ring 3s ease-out infinite",animationDelay:".6s"}}),
        h("div",{style:{
          width:150,height:150,borderRadius:"50%",
          background:phase!=="idle"?"radial-gradient(circle, rgba(37,99,235,0.2), rgba(124,58,237,0.1))":"rgba(8,14,28,0.9)",
          border:"1.5px solid rgba(59,130,246,"+(phase!=="idle"?.5:.12)+")",
          display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
          transform:"scale("+scale+")",
          transition:"transform "+tdur+"s ease-in-out",
          boxShadow:phase!=="idle"?"0 0 50px rgba(37,99,235,0.15), inset 0 0 30px rgba(37,99,235,0.05)":"none",
        }},
          h("div",{style:{fontFamily:"Syne",fontSize:13,fontWeight:700,color:phase!=="idle"?"#60a5fa":"#1e3050",letterSpacing:".12em"}},phLabel),
          cycles>0&&h("div",{style:{fontSize:10,color:"#334155",marginTop:4}},cycles+" cycle"+(cycles>1?"s":""))
        )
      ),
      phase==="idle"?h("button",{className:"btnp",onClick:startBreath,style:{padding:"13px 36px",fontSize:14}},"Begin Session"):h("button",{className:"btns",onClick:stopBreath,style:{padding:"12px 30px",fontSize:13}},"Stop"),
      h("div",{style:{display:"flex",justifyContent:"center",gap:36,marginTop:32}},
        [{l:"Inhale",t:"4s"},{l:"Hold",t:"4s"},{l:"Exhale",t:"6s"}].map(function(s){
          return h("div",{key:s.l,style:{textAlign:"center"}},h("div",{style:{fontSize:18,fontWeight:700,fontFamily:"Syne",color:"#3b82f6"}},(s).t),h("div",{style:{fontSize:10,color:"#334155",marginTop:3}},s.l));
        })
      )
    ),

    tool==="grounding"&&h("div",{className:"gcard",style:{padding:"30px"}},
      h("div",{style:{fontFamily:"Syne",fontWeight:700,fontSize:18,color:"#e2e8f5",marginBottom:5}},"5-4-3-2-1 Grounding"),
      h("div",{style:{color:"#334155",fontSize:12,marginBottom:22}},"Anchors attention in sensory reality · interrupts tic cycle"),
      h("div",{style:{display:"flex",gap:5,marginBottom:26}},
        GS.map(function(_,i){return h("div",{key:i,style:{flex:1,height:3,borderRadius:2,background:i<=gStep?"linear-gradient(90deg,#3b82f6,#7c3aed)":"rgba(255,255,255,0.05)",transition:"background .35s"}});})),
      gStep<GS.length?h("div",null,
        h("div",{style:{display:"flex",alignItems:"center",gap:14,marginBottom:18}},
          h("div",{style:{fontSize:32}},cg.emoji),
          h("div",null,h("div",{style:{fontSize:10,color:"#3b82f6",fontWeight:600,letterSpacing:".12em",marginBottom:3}},"STEP "+(gStep+1)+" OF 5"),h("div",{style:{fontFamily:"Syne",fontSize:18,fontWeight:700,color:"#e2e8f5"}},cg.sense+" × "+cg.n))
        ),
        h("p",{style:{color:"#475569",fontSize:13,marginBottom:20,lineHeight:1.7}},cg.prompt),
        h("div",{style:{display:"flex",flexDirection:"column",gap:8,marginBottom:22}},
          Array.from({length:cg.n},function(_,i){
            var k=gStep+"-"+i;
            return h("input",{key:i,className:"inp",value:gAns[k]||"",onChange:function(e){var v=e.target.value;setGAns(function(a){var n=Object.assign({},a);n[k]=v;return n;});},placeholder:(i+1)+".",style:{width:"100%",padding:"10px 14px",fontSize:13}});
          })
        ),
        h("div",{style:{display:"flex",gap:8}},
          gStep>0&&h("button",{className:"btns",onClick:function(){setGStep(function(s){return s-1;});},style:{padding:"10px 20px",fontSize:12}},"Back"),
          h("button",{className:"btnp",onClick:function(){setGStep(function(s){return s+1;});},style:{padding:"10px 24px",fontSize:13}},gStep<4?"Next Step":"Complete")
        )
      ):h("div",{style:{textAlign:"center",padding:"24px 0"}},
        h("div",{style:{fontSize:40,marginBottom:14}},"✨"),
        h("div",{style:{fontFamily:"Syne",fontSize:20,fontWeight:700,color:"#e2e8f5",marginBottom:8}},"Grounded"),
        h("div",{style:{color:"#475569",fontSize:13,marginBottom:26}},"You've completed the exercise. Notice how you feel right now."),
        h("button",{className:"btnp",onClick:function(){setGStep(0);setGAns({});},style:{padding:"10px 24px",fontSize:13}},"Start Again")
      )
    ),

    tool==="reset"&&h("div",{className:"gcard",style:{padding:"28px"}},
      h("div",{style:{fontFamily:"Syne",fontWeight:700,fontSize:18,color:"#e2e8f5",marginBottom:5}},"Focus Reset"),
      h("div",{style:{color:"#334155",fontSize:12,marginBottom:24}},"Sensory redirection techniques · breaks the tic-anxiety feedback loop"),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}},
        [{title:"Cold Water",desc:"Splash cold water on your face. Activates the mammalian dive reflex, rapidly slowing heart rate.",emoji:"💧",c:"#2dd4bf"},{title:"Muscle Release",desc:"Tense all muscles for 5 seconds, then release completely. Redirects neural urge energy.",emoji:"💪",c:"#60a5fa"},{title:"Body Scan",desc:"Close eyes. Scan from feet to head without judgment. 60 seconds of quiet observation.",emoji:"🧘",c:"#a78bfa"},{title:"Object Focus",desc:"Study a nearby object — texture, shape, color — in intense detail for 30 seconds.",emoji:"🔍",c:"#34d399"}]
          .map(function(t){
            return h("div",{key:t.title,style:{padding:"20px",background:"rgba(8,14,28,0.7)",borderRadius:14,border:"1px solid "+t.c+"18",cursor:"pointer",transition:"all .25s"},
              onMouseEnter:function(e){e.currentTarget.style.borderColor=t.c+"45";e.currentTarget.style.boxShadow="0 0 20px "+t.c+"12";},
              onMouseLeave:function(e){e.currentTarget.style.borderColor=t.c+"18";e.currentTarget.style.boxShadow="none";}
            },
              h("div",{style:{fontSize:26,marginBottom:10}},t.emoji),
              h("div",{style:{fontWeight:600,fontSize:13,color:"#e2e8f5",marginBottom:7}},t.title),
              h("div",{style:{fontSize:11,color:"#475569",lineHeight:1.7}},t.desc)
            );
          })
      )
    )
  );
}

// ── APP ROOT ──
function App(){
  var ps=useState("dash"); var page=ps[0],setPage=ps[1];
  var es=useState(loadData); var entries=es[0],setEntries=es[1];
  var cur;
  if(page==="dash") cur=h(DashPage,{key:"dash",entries:entries});
  else if(page==="log") cur=h(LogPage,{key:"log",entries:entries,setEntries:setEntries});
  else if(page==="analytics") cur=h(AnalyticsPage,{key:"analytics",entries:entries});
  else if(page==="heatmap") cur=h(HeatmapPage,{key:"heatmap",entries:entries});
  else if(page==="report") cur=h(ReportPage,{key:"report",entries:entries});
  else if(page==="calm") cur=h(CalmPage,{key:"calm"});
  return h("div",{className:"app"},h(Sidebar,{page:page,setPage:setPage}),h("div",{className:"main"},cur));
}

RD.createRoot(document.getElementById("root")).render(h(App,{}));
})();
</script>
