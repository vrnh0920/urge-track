*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050810;--surface:#0a0f1e;--surface2:#0f1626;--border:rgba(255,255,255,0.06);
  --blue:#3b82f6;--violet:#7c3aed;--teal:#14b8a6;--green:#22c55e;
  --text:#e2e8f0;--muted:#475569;--dim:#1e293b;
  --red:#ef4444;--amber:#f59e0b;--orange:#f97316;
}
  @keyframes bubble-float{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-54%) scale(1.04)}}
  @keyframes pop-float{0%{opacity:1;transform:translate(-50%,-100%) scale(1)}100%{opacity:0;transform:translate(-50%,-200%) scale(1.3)}}

html,body,#root{height:100%;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);overflow:hidden;transition:background .3s;}
body.light,body.light #root{background:radial-gradient(ellipse at 15% 15%,#bfdbfe,#ede9fe 60%,#ddd6fe 100%)!important;}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(59,130,246,0.25);border-radius:2px}
#neural-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.45}
.auth-wrap{position:relative;z-index:10;display:flex;align-items:center;justify-content:center;height:100vh}
.auth-card{background:rgba(10,15,30,0.92);border:1px solid var(--border);border-radius:20px;padding:44px 40px;width:400px;backdrop-filter:blur(20px)}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.auth-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--blue),var(--violet));border-radius:10px;display:flex;align-items:center;justify-content:center}
.auth-logo-text{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;letter-spacing:-.02em;color:var(--text)}
.auth-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px;letter-spacing:-.02em}
.auth-sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.5}
.auth-field{margin-bottom:16px}
.auth-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:7px}
.auth-input{width:100%;background:rgba(5,8,16,0.8);border:1px solid rgba(255,255,255,0.08);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;border-radius:10px;padding:11px 14px;outline:none;transition:border-color .2s}
.auth-input:focus{border-color:rgba(59,130,246,0.5);box-shadow:0 0 0 3px rgba(59,130,246,0.07)}
.auth-input::placeholder{color:var(--dim)}
.auth-btn{width:100%;padding:13px;border:none;border-radius:11px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(99,102,241,0.3);margin-top:4px}
.auth-btn:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(99,102,241,0.45)}
.auth-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.auth-switch{text-align:center;margin-top:20px;font-size:12px;color:var(--muted)}
.auth-switch a{color:var(--blue);cursor:pointer;text-decoration:none}
.auth-err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:8px;padding:10px 12px;font-size:12px;color:#f87171;margin-bottom:14px}
.auth-ok{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.25);border-radius:8px;padding:10px 12px;font-size:12px;color:#4ade80;margin-bottom:14px}
.app{display:flex;height:100vh;width:100%;position:relative;z-index:1}
.sidebar{width:62px;background:rgba(5,8,16,0.95);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:18px 0 14px;gap:2px;flex-shrink:0}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);display:flex;align-items:center;justify-content:center;margin-bottom:16px;flex-shrink:0;box-shadow:0 0 18px rgba(99,102,241,0.35)}
.nav-btn{width:40px;height:40px;border-radius:10px;border:none;background:transparent;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative;flex-shrink:0;margin-bottom:1px}
.nav-btn:hover{background:rgba(59,130,246,0.08);color:#60a5fa}
.nav-btn.on{background:rgba(59,130,246,0.12);color:#60a5fa}
.nav-btn.on::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:20px;background:linear-gradient(to bottom,#3b82f6,#8b5cf6);border-radius:0 2px 2px 0}
.nav-btn.signout{margin-top:auto;color:#334155}
.nav-btn.signout:hover{color:#f87171;background:rgba(239,68,68,0.08)}
.main{flex:1;overflow-y:auto;overflow-x:hidden;position:relative}
.page{padding:28px 34px;min-height:100%;animation:pu .3s ease forwards}
@keyframes pu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{background:rgba(10,15,30,0.8);border:1px solid var(--border);border-radius:15px;backdrop-filter:blur(14px);transition:border-color .2s}
.card:hover{border-color:rgba(59,130,246,0.14)}
.gcard{background:rgba(10,15,30,0.85);border-radius:15px;position:relative;overflow:hidden}
.gcard::before{content:"";position:absolute;inset:0;border-radius:15px;padding:1px;background:linear-gradient(135deg,rgba(59,130,246,0.22),rgba(124,58,237,0.1),rgba(20,184,166,0.08));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.inp{background:rgba(5,8,16,0.9);border:1px solid rgba(255,255,255,0.07);color:var(--text);font-family:'Inter',sans-serif;border-radius:9px;outline:none;transition:border-color .2s}
.inp:focus{border-color:rgba(59,130,246,0.45);box-shadow:0 0 0 3px rgba(59,130,246,0.07)}
.inp::placeholder{color:var(--dim)}
.chip{padding:6px 13px;border-radius:20px;border:1px solid rgba(255,255,255,0.06);background:rgba(10,15,30,0.8);color:var(--muted);cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:rgba(59,130,246,0.3);color:#60a5fa}
.chip.sel{background:rgba(59,130,246,0.1);color:#60a5fa;border-color:rgba(59,130,246,0.4)}
.svb{width:34px;height:34px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--muted);cursor:pointer;font-weight:700;font-size:13px;transition:all .15s;font-family:'Inter',sans-serif}
.sv1.on{background:rgba(34,197,94,0.12);color:#4ade80;border-color:rgba(34,197,94,0.4)}
.sv2.on{background:rgba(20,184,166,0.12);color:#2dd4bf;border-color:rgba(20,184,166,0.4)}
.sv3.on{background:rgba(245,158,11,0.12);color:#fbbf24;border-color:rgba(245,158,11,0.4)}
.sv4.on{background:rgba(249,115,22,0.12);color:#fb923c;border-color:rgba(249,115,22,0.4)}
.sv5.on{background:rgba(239,68,68,0.12);color:#f87171;border-color:rgba(239,68,68,0.4)}
.btnp{background:linear-gradient(135deg,#2563eb,#7c3aed);border:none;color:#fff;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;border-radius:10px;transition:all .2s;box-shadow:0 4px 18px rgba(99,102,241,0.28)}
.btnp:hover{transform:translateY(-1px);box-shadow:0 6px 26px rgba(99,102,241,0.42)}
.btnp:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btns{background:rgba(10,15,30,0.8);border:1px solid rgba(59,130,246,0.2);color:#60a5fa;font-family:'Inter',sans-serif;cursor:pointer;border-radius:9px;transition:all .2s}
.btns:hover{background:rgba(59,130,246,0.1);border-color:rgba(59,130,246,0.4)}
.mcard{padding:20px 22px;position:relative;overflow:hidden}
.mtitle{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.mval{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:700;line-height:1}
.msub{font-size:11px;color:var(--muted);margin-top:5px}
.waveform{height:56px;width:100%;position:relative;overflow:hidden}
.wave-bar{position:absolute;bottom:0;width:3px;border-radius:2px 2px 0 0;transition:height .3s ease}
.report-section{margin-bottom:28px}
.report-h{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
body.light{--bg:transparent;--surface:#ffffff;--surface2:#e8edf5;--border:rgba(0,0,0,0.08);--text:#0f172a;--muted:#64748b;--dim:#94a3b8;}
body.light .card{background:rgba(255,255,255,0.9);}
body.light .gcard{background:rgba(255,255,255,0.95);}
body.light .sidebar{background:rgba(240,244,255,0.98);}
body.light .nav-btn{color:#94a3b8;}

body.light .inp{background:rgba(240,244,255,0.9);border-color:rgba(0,0,0,0.1);color:#0f172a;}

body.light .auth-card{background:rgba(255,255,255,0.95);}
body.light #neural-bg{opacity:0;}
body.light body{background:radial-gradient(ellipse at 20% 20%,#dbeafe 0%,#f0f4ff 40%,#ede9fe 100%);}
body.light html,body.light body,body.light #root{background:radial-gradient(ellipse at 20% 20%,#dbeafe 0%,#f0f4ff 40%,#ede9fe 100%);}
body.light h1{color:#0f172a;}
body.light .auth-logo-text{color:#0f172a;}
body.light .mtitle{color:#64748b;}
body.light .msub{color:#64748b;}
body.light .report-h{color:#64748b;}
@keyframes pulse-ring{0%{transform:scale(1);opacity:.5}100%{transform:scale(2.2);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(5,8,16,0.97);border-top:1px solid rgba(255,255,255,0.08);z-index:200;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding-bottom:env(safe-area-inset-bottom);}
.bnav-inner{display:flex;align-items:center;justify-content:space-around;height:60px;padding:0 4px;}
.bnav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;flex:1;height:100%;border:none;background:none;color:#334155;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:color .15s;}
.bnav-btn.on{color:#60a5fa;}
.bnav-lbl{font-size:9px;font-family:'Inter',sans-serif;font-weight:500;}
@media(max-width:767px){
  .bnav{display:flex;}
  .sidebar{display:none!important;}
  .main{padding-bottom:calc(60px + env(safe-area-inset-bottom))!important;}
  .page{padding:18px 14px!important;}
  .auth-card{width:calc(100vw - 32px)!important;padding:28px 20px!important;}
  .auth-wrap{padding:0 16px;align-items:flex-start;padding-top:60px;}
}
@media(min-width:768px) and (max-width:1023px){
  .sidebar{width:56px!important;}
  .page{padding:22px 20px!important;}
}
@media(max-width:767px){
  .stat-grid{grid-template-columns:repeat(2,1fr)!important;gap:8px!important;}
  .stat-grid{grid-template-columns:repeat(2,1fr)!important;gap:8px!important;}
.two-col{grid-template-columns:1fr!important;}
.entries-grid{grid-template-columns:1fr!important;}
}
.settings-divider{border-top:1px solid var(--border);margin:24px 0}
.tgl{position:relative;width:42px;height:24px;display:inline-block;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0;position:absolute}
.tgl-track{position:absolute;inset:0;background:rgba(255,255,255,0.08);border-radius:24px;cursor:pointer;transition:background .2s}
.tgl-thumb{position:absolute;left:3px;top:3px;width:18px;height:18px;background:#475569;border-radius:50%;transition:all .2s;pointer-events:none}
.tgl input:checked + .tgl-track{background:rgba(59,130,246,0.4)}
.tgl input:checked + .tgl-track .tgl-thumb{transform:translateX(18px);background:#3b82f6}
.tour-ring{position:fixed;border-radius:50%;border:2px solid #3b82f6;pointer-events:none}
.tour-ring::after{content:"";position:absolute;inset:0;border-radius:50%;border:2px solid #3b82f6;animation:pulse-ring 1.5s ease-out infinite}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.04) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
.res-card{border-left:3px solid transparent;transition:border-color .2s,background .2s}
.res-card:hover{border-left-color:#3b82f6}
button.res-card{background:rgba(10,15,30,0.8);border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border);font-family:'Inter',sans-serif;color:inherit}

<script>
(function(){
var canvas=document.getElementById("neural-bg");
var ctx=canvas.getContext("2d");
var nodes=[];var N=80;var DIST=130;
var bc=["14,184,166","59,130,246","124,58,237"];
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
function init(){nodes=[];for(var i=0;i<N;i++){nodes.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-.5)*.22,vy:(Math.random()-.5)*.22,r:Math.random()*1.1+.35,c:Math.floor(Math.random()*3)});}}
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);for(var i=0;i<N;i++){for(var j=i+1;j<N;j++){var dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<DIST){ctx.strokeStyle="rgba("+bc[nodes[i].c]+","+(1-d/DIST)*.32+")";ctx.lineWidth=.5;ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.stroke();}}}for(var k=0;k<N;k++){var n=nodes[k];ctx.fillStyle="rgba("+bc[n.c]+",.65)";ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();}}
function update(){for(var i=0;i<N;i++){nodes[i].x+=nodes[i].vx;nodes[i].y+=nodes[i].vy;if(nodes[i].x<0||nodes[i].x>canvas.width)nodes[i].vx*=-1;if(nodes[i].y<0||nodes[i].y>canvas.height)nodes[i].vy*=-1;}}
function loop(){update();draw();requestAnimationFrame(loop);}
resize();init();loop();

window.addEventListener("resize",function(){resize();init();});
})();
</script>

var RESOURCE_SECTIONS=[
  {title:"Understanding Tourette's",items:[
    {title:"What is Tourette Syndrome?",desc:"An overview of TS — symptoms, onset, and how tics are diagnosed.",
      article:[
        "Tourette syndrome (TS) is a neurodevelopmental condition defined by the presence of multiple motor tics and at least one vocal (phonic) tic, with both types present at some point during the illness, persisting for more than a year, and beginning before age 18. Tics are sudden, rapid, repetitive movements or sounds — simple ones like eye blinking, shoulder shrugging, sniffing, or throat clearing, and complex ones that involve coordinated sequences of movement or words.",
        "Tics wax and wane over time — they can change in type, frequency, and intensity over weeks or months, and they are strongly influenced by stress, excitement, fatigue, illness, and anxiety, often easing during calm, focused activities like reading or playing an instrument. Most people can suppress tics briefly, but suppression usually builds internal tension that is released as an increase in tics afterward.",
        "TS affects an estimated 1 in 160 school-age children to some degree, with boys diagnosed roughly three to four times more often than girls. The exact cause isn't fully understood, but research points to differences in the basal ganglia and the cortico-striato-thalamo-cortical circuits that govern movement, along with dopamine signaling differences and a meaningful genetic component — TS often runs in families.",
        "For many people, tics are most pronounced between ages 8 and 12 and gradually ease by late adolescence or early adulthood; a substantial number of adults have few or no noticeable tics. TS frequently co-occurs with other conditions, most commonly ADHD and obsessive-compulsive disorder (OCD), and anxiety — these co-occurring conditions are often more functionally impairing day-to-day than the tics themselves.",
        "There is no blood test or brain scan that diagnoses TS; diagnosis is clinical, made by a doctor familiar with tic disorders based on history and observation over time. Understanding TS as a neurobiological condition — not a behavioral choice — is the foundation for compassionate, effective support at home, at school, and in healthcare settings."
      ],
      sources:["American Psychiatric Association. Diagnostic and Statistical Manual of Mental Disorders, 5th ed. (DSM-5). 2013.","Cavanna AE, Seri S. \"Tourette's syndrome.\" BMJ, 2013.","Centers for Disease Control and Prevention. \"Tourette Syndrome: Data and Statistics.\" 2022."]},
    {title:"TS vs Other Tic Disorders",desc:"How clinicians distinguish Tourette syndrome from other tic disorders, and why the distinction matters for care.",
      article:[
        "\"Tic disorder\" is an umbrella term covering several related diagnoses that differ mainly in duration and which types of tics are present. Provisional tic disorder involves motor or vocal tics (or both) present for less than 12 months — this is actually the most common presentation in young children, and many cases resolve on their own. Persistent (chronic) motor or vocal tic disorder involves only one type of tic — motor or vocal, not both — lasting more than a year. Tourette syndrome requires both motor and vocal tics, also for more than a year.",
        "These distinctions matter clinically because prognosis and treatment planning can differ, but in practice the day-to-day experience of living with any persistent tic disorder is similar, and approaches like CBIT apply across the spectrum. A diagnosis can also shift over time — a child first diagnosed with provisional tic disorder may later meet criteria for Tourette syndrome if vocal tics emerge and persist.",
        "It's also important to distinguish tics from other movement phenomena. Stereotypies (common in autism) are rhythmic, fixed patterns that usually don't have a preceding urge. Dystonia and chorea are neurological movement disorders with a different underlying cause and appearance. More recently, clinicians have described \"functional tic-like behaviors\" — a distinct presentation, often with sudden onset in adolescence or young adulthood, frequently linked to social media exposure, that looks different from developmental TS (abrupt onset, complex tics from the start, and a different response pattern to treatment).",
        "Because the conditions can look similar at a glance but call for different approaches, an accurate diagnosis from a clinician experienced with tic disorders — a pediatric neurologist, movement disorder specialist, or psychiatrist — is the right first step rather than self-diagnosing from a description or video online."
      ],
      sources:["American Psychiatric Association. DSM-5. 2013.","Black KJ, et al. \"Provisional Tic Disorder.\" F1000Research, 2016.","Robinson S, Hedderly T. \"Functional tic-like behaviours.\" Frontiers in Neurology, 2023."]},
    {title:"Premonitory Urges Explained",desc:"The buildup of sensation before a tic, and why it's central to behavioral treatment.",
      article:[
        "Most people with tics who are old enough to articulate it — generally by age 10 or so — describe an uncomfortable sensation that builds up before a tic occurs. This is called the premonitory urge. It's commonly described as a localized pressure, itch, tension, or a sense that something isn't \"just right,\" concentrated in the area where the tic will occur, such as the throat before a vocal tic or the shoulder before a shrug.",
        "The relationship between the urge and the tic resembles an itch-scratch cycle: the urge builds in intensity, performing the tic provides a brief, often satisfying sense of relief, and then the cycle begins again. Younger children frequently tic without reporting any urge at all — the ability to notice and describe the sensation tends to develop with age and self-awareness.",
        "Premonitory urges are central to modern behavioral treatment. Comprehensive Behavioral Intervention for Tics (CBIT) and Habit Reversal Training (HRT) both begin with \"awareness training,\" where a person practices noticing the urge as early as possible — before the tic happens — so they have a window of opportunity to use a competing response instead of letting the tic run its course.",
        "Brain imaging research has linked the experience of premonitory urges to activity in the insular cortex and supplementary motor area, regions involved in interoception (sensing the internal state of the body) and movement preparation — lending biological support to what people with tics have long described subjectively.",
        "Recognizing the urge as a real, physical sensation — rather than dismissing tics as something a person should simply be able to stop — helps families and educators respond with patience rather than frustration."
      ],
      sources:["Leckman JF, et al. \"Premonitory urges in Tourette's syndrome.\" American Journal of Psychiatry, 1993.","Bullen JG, Hemsley DR. \"Sensory experience as a trigger in Gilles de la Tourette's syndrome.\" 1983.","Cavanna AE, et al. \"The behavioral spectrum of premonitory urges.\" Journal of Neuropsychiatry and Clinical Neurosciences, 2017."]},
    {title:"Common Myths & Facts",desc:"TS isn't just swearing, it isn't caused by parenting, and it isn't rare.",
      article:[
        "Myth: People with Tourette syndrome always swear or shout slurs uncontrollably. Fact: this symptom, called coprolalia, is one of the most well-known features of TS in pop culture but actually occurs in only around 10% of people with the condition. The vast majority of tics are far less dramatic — blinking, sniffing, head movements, or simple sounds.",
        "Myth: tics are a choice, and people could stop if they really tried. Fact: tics are described as semi-involuntary — most people can suppress them for a period, similar to suppressing the urge to scratch an itch, but doing so takes real effort and typically leads to a rebound increase in tics once they let go. Telling someone to \"just stop\" rarely helps and often adds shame on top of an already involuntary experience.",
        "Myth: TS is caused by anxious or overly permissive parenting, or by something a parent did during pregnancy. Fact: TS is a neurobiological condition with a strong genetic component; nothing a parent did causes it, and no parenting style cures it, though a calm and accepting environment can reduce stress that tends to amplify tics.",
        "Myth: everyone with TS has severe, disabling symptoms. Fact: severity varies enormously. Many people have mild tics that are barely noticeable to others, and a large proportion see significant improvement by early adulthood.",
        "Myth: TS is extremely rare. Fact: tic disorders are relatively common — population studies estimate roughly 1 in 160 school-age children show features of Tourette syndrome, with milder or transient tics being even more frequent."
      ],
      sources:["Tourette Association of America. \"Myths and Facts about Tourette.\" 2021.","Cavanna AE, Seri S. \"Tourette's syndrome.\" BMJ, 2013.","Scharf JM, et al. \"Population prevalence of Tourette syndrome.\" Pediatrics, 2015."]},
  ]},
  {title:"Treatment & Therapy",items:[
    {title:"CBIT: Comprehensive Behavioral Intervention",desc:"The evidence-based, first-line behavioral therapy for tics — how it works and what a course of treatment looks like.",
      article:[
        "Comprehensive Behavioral Intervention for Tics (CBIT) is the leading evidence-based, non-drug treatment for tic disorders, recommended as a first-line option by the American Academy of Neurology. It builds on Habit Reversal Training by adding two more components: psychoeducation about tics and the urge-tic cycle, and \"function-based\" assessment — identifying situations, environments, or behaviors that make a person's tics worse and adjusting them where possible.",
        "A typical course runs 8 to 10 sessions with a trained therapist. Sessions involve learning to notice the premonitory urge earlier, practicing a competing response for target tics, and working through real-life situations where tics are most disruptive — at school, during homework, or in social settings — along with relaxation training, since stress reliably worsens tics for most people.",
        "The evidence base is strong: a randomized controlled trial in children (Piacentini et al., 2010, published in JAMA) and a parallel trial in adults (Wilhelm et al., 2012) both found CBIT produced significantly greater reductions in tic severity than a supportive, non-specific therapy control condition, with benefits maintained at follow-up.",
        "CBIT does not cure Tourette syndrome and does not eliminate every tic — the goal is meaningfully reducing tic frequency and impairment and building a durable, lifelong self-management skill, which can be used alongside medication for more severe cases rather than as a strict either-or choice."
      ],
      sources:["Piacentini J, et al. \"Behavior therapy for children with Tourette disorder: a randomized controlled trial.\" JAMA, 2010.","Wilhelm S, et al. \"Randomized trial of behavior therapy for adults with Tourette syndrome.\" Archives of General Psychiatry, 2012.","Pringsheim T, et al. \"Comprehensive systematic review summary: Treatment of tics in people with Tourette syndrome.\" Neurology, 2019."]},
    {title:"Finding a CBIT Therapist",desc:"How to locate a clinician trained in CBIT, including telehealth options.",
      article:[
        "CBIT is a specialized skill — most general therapists and even many psychologists haven't been trained in it, so finding the right provider takes some specific searching rather than picking the first therapist who accepts your insurance.",
        "The Tourette Association of America maintains a national directory of behavioral health providers trained in CBIT, searchable by location, and many academic medical centers with movement disorder or tic clinics either offer it directly or can refer you to someone who does.",
        "Telehealth has substantially expanded access since 2020 — CBIT has been shown to translate effectively to video sessions, which matters a great deal for families outside major metro areas where in-person specialists are scarce.",
        "When evaluating a potential therapist, it's reasonable to ask directly about their specific training and experience with CBIT and tic disorders, how many sessions a typical course involves, and how they handle co-occurring conditions like ADHD or OCD, since these often need to be factored into treatment planning.",
        "Cost and insurance coverage vary; some providers offer sliding-scale rates, and university-affiliated tic disorder clinics sometimes have reduced-cost options or research-study treatment slots worth asking about."
      ],
      sources:["Tourette Association of America. \"Behavioral Therapy Provider Directory.\" Accessed 2024.","Woods DW, et al. Managing Tourette Syndrome: A Behavioral Intervention for Children and Adults — Therapist Guide. Oxford University Press, 2008."]},
    {title:"Medication Options Overview",desc:"A plain-language rundown of medications sometimes used to manage tics, including how they work and common tradeoffs.",
      article:[
        "Medication is generally considered when tics cause significant pain, social difficulty, or functional impairment, or when behavioral therapy alone isn't enough or isn't accessible — current guidelines do not recommend medication as the automatic first step ahead of behavioral treatment.",
        "Alpha-2 agonists, such as clonidine and guanfacine, are often tried first. They produce a modest reduction in tics, and have the added benefit of also helping with co-occurring ADHD symptoms; common side effects include drowsiness and lower blood pressure.",
        "Antipsychotic medications — including risperidone, aripiprazole, and older agents like pimozide and fluphenazine — tend to be more effective at directly reducing tic severity, but come with a higher side-effect burden: weight gain, sedation, metabolic changes, and, rarely, movement-related side effects with longer-term use.",
        "Other options, such as VMAT2 inhibitors (e.g., tetrabenazine-class medications), are sometimes used, particularly when other options haven't worked well or aren't tolerated.",
        "There's no single \"best\" medication — the right choice is an individualized decision made together by the patient, family, and prescriber, weighing how much the tics are actually interfering with life against the side-effect profile of each option, and medication is frequently combined with CBIT rather than used alone."
      ],
      sources:["Pringsheim T, et al. \"Treatment of tics in people with Tourette syndrome.\" Neurology, 2019 (AAN guideline).","Quezada J, Coffman KA. \"Current Approaches and New Developments in the Pharmacological Management of Tourette Syndrome.\" CNS Drugs, 2018."]},
    {title:"HRT: Habit Reversal Training",desc:"Learning a competing response to interrupt a tic before it happens.",
      article:[
        "Habit Reversal Training (HRT) is the core behavioral technique inside CBIT, originally described by Azrin and Nunn in 1973 for treating nervous habits and tics. It has two main parts: awareness training and competing response training.",
        "Awareness training means practicing noticing a tic, or ideally the premonitory urge that precedes it, as early as possible — often by describing the tic out loud in session until the person can reliably catch it in the moment, not just after the fact.",
        "Competing response training means choosing a voluntary movement that is physically incompatible with the tic and holding it for about a minute, or until the urge passes, whenever the urge or tic is noticed. For example, someone with a shoulder-shrug tic might learn to gently pull both shoulders down and hold that position; someone with an eye-blinking tic might practice slow, controlled blinking instead.",
        "The competing response is first practiced in session, then deliberately rehearsed in daily situations, gradually building up to using it in the real-world settings where the tic is most frequent — schoolwork, conversations, stressful moments — so the skill generalizes beyond the therapy room.",
        "HRT is a skill that improves with consistent practice rather than something that eliminates tics instantly; most people see a gradual reduction in the tics they actively work on over weeks of regular use."
      ],
      sources:["Azrin NH, Nunn RG. \"Habit-reversal: a method of eliminating nervous habits and tics.\" Behaviour Research and Therapy, 1973.","Woods DW, Piacentini J, Chang S, et al. Managing Tourette Syndrome: A Behavioral Intervention for Children and Adults — Therapist Guide. Oxford University Press, 2008."]},
  ]},
  {title:"Community & Support",items:[
    {title:"Tourette Association of America",desc:"The national nonprofit for TS — education, advocacy, research funding, and local chapter events.",
      article:[
        "The Tourette Association of America (TAA) is the leading national nonprofit organization in the United States dedicated to Tourette syndrome and tic disorders, founded in 1972 by parents seeking better information and support.",
        "TAA's work spans several areas: public education to reduce stigma and misinformation, advocacy for healthcare access and disability accommodations, and funding for scientific research into the causes and treatment of tic disorders.",
        "Practical resources include a helpline for individuals and families, directories of behavioral therapy providers and medical specialists, school accommodation toolkits for navigating IEPs and 504 plans, and summer camps where kids and teens with TS can connect with peers in a judgment-free environment.",
        "TAA also designates \"Centers of Excellence\" — academic medical centers with specialized, multidisciplinary tic disorder clinics — and supports a network of local chapters that organize in-person support groups and fundraising or awareness events throughout the year."
      ],
      sources:["Tourette Association of America. \"About Us.\" Organizational materials, 2024."]},
    {title:"r/Tourettes Community",desc:"An active peer community where people with TS share experiences, ask questions, and support each other.",
      article:[
        "Online peer communities, including forums and social platforms with active Tourette syndrome communities, can be valuable for the simple reason that talking to other people who actually live with tics — not just clinicians — provides a kind of validation and practical, lived-experience advice that's hard to get elsewhere.",
        "These communities work best as a complement to, not a replacement for, professional care. They're not moderated by medical professionals, so it's worth treating personal anecdotes and home remedies with healthy skepticism and checking anything medically significant with a doctor or therapist who knows your specific situation.",
        "A notable thing to be aware of when researching tics online: clinicians have documented a rise since around 2020 in \"functional tic-like behaviors,\" a distinct condition often linked to heavy exposure to tic-related social media content, which can look similar to developmental TS but has a different course and treatment approach. This doesn't make peer communities unsafe — it just means content seen online shouldn't be used to self-diagnose.",
        "Used thoughtfully, peer communities are genuinely useful for reducing the isolation that can come with a visible, often misunderstood condition, and for trading day-to-day coping strategies that complement clinical treatment."
      ],
      sources:["Robinson S, Hedderly T. \"Functional tic-like behaviours.\" Frontiers in Neurology, 2023.","Tourette Association of America. \"Online Safety and Community Resources.\" 2023."]},
    {title:"TS Online Support Group",desc:"Free virtual peer support groups for people with TS and their families.",
      article:[
        "Beyond informal online communities, many organizations run structured, facilitated virtual support groups specifically for people with Tourette syndrome and their family members, often free of charge.",
        "These groups differ from casual forums in that they're typically scheduled, smaller, and guided by a facilitator — sometimes a clinician, sometimes a trained peer — which tends to keep discussion focused and supportive rather than open-ended.",
        "The benefit of structured peer support is well documented in chronic-condition research generally: it reduces feelings of isolation, gives people a place to share coping strategies that worked for them specifically, and helps validate experiences like fatigue from tic suppression or frustration with misunderstanding from others, in a way that's hard to replicate even with a supportive but unaffected family member.",
        "Support groups are a complement to clinical treatment, not a substitute for it — they're a good source of day-to-day coping wisdom, but decisions about therapy or medication are best made with a qualified clinician. A therapist, local TAA chapter, or hospital social worker can usually point you toward an active group that fits your situation."
      ],
      sources:["Tourette Association of America. \"Support Group Directory.\" 2024.","Conelea CA, et al. \"Tic-related impairment and quality of life.\" Psychiatry Research, 2011."]},
    {title:"Kids & Teens with TS",desc:"School accommodations, talking to friends, and growing up with tics.",
      article:[
        "Tourette syndrome most often begins between ages 4 and 6, with tics typically becoming most noticeable and intense around ages 10 to 12 before gradually easing for many young people by late adolescence. Knowing this trajectory can help families and kids see the present intensity of tics as a phase rather than a permanent state.",
        "School accommodations make a real difference. A 504 plan or IEP can provide things like extra time on tests, a private space to tic without an audience, reduced penalties for tic-related disruptions (like blurting during class), and preferential seating. Educating teachers and, with the student's input, classmates about tics can meaningfully reduce both misunderstanding and bullying.",
        "Co-occurring conditions are common and often more impairing day-to-day than the tics themselves: roughly 60% of children with TS also have ADHD, and around 30% have OCD, along with elevated rates of anxiety. Treatment plans for kids generally prioritize whichever condition is causing the most difficulty in daily life, not necessarily the tics.",
        "How a young person talks about their tics with friends matters for their long-term self-image. Many kids find that a brief, matter-of-fact explanation (\"I have Tourette's, it means I make movements/sounds I can't fully control, it's not contagious and I'm fine\") defuses curiosity and reduces teasing far more effectively than ignoring questions or hiding the tics.",
        "Peer connection with other kids who have TS — through camps, youth programs, or online youth communities run by organizations like the Tourette Association of America — consistently helps young people build confidence and a sense that they're not alone in navigating tics at school and socially."
      ],
      sources:["Tourette Association of America. \"Tourette Syndrome in Schools\" educator toolkit, 2022.","Hirschtritt ME, et al. \"Lifetime prevalence, age of risk, and genetic relationships of comorbid psychiatric disorders in Tourette syndrome.\" JAMA Psychiatry, 2015."]},
  ]},

function DiscussPage(p){
  var vs=useState("feed");var view=vs[0],setView=vs[1];
  var ps=useState([]);var posts=ps[0],setPosts=ps[1];
  var fs=useState(true);var fetching=fs[0],setFetching=fs[1];
  var ls=useState({});var likes=ls[0],setLikes=ls[1];
  var sel=useState(null);var selPost=sel[0],setSelPost=sel[1];
  var showNew=useState(false);var newPost=showNew[0],setNewPost=showNew[1];
  var tt=useState("");var title=tt[0],setTitle=tt[1];
  var bt=useState("");var body=bt[0],setBody=bt[1];
  var sub=useState(false);var submitting=sub[0],setSubmitting=sub[1];

  useEffect(function(){
    loadPosts();
    var ch=sb.channel("posts-feed")
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"posts"},function(payload){
        setPosts(function(prev){return[payload.new].concat(prev);});
      })
      .on("postgres_changes",{event:"DELETE",schema:"public",table:"posts"},function(payload){
        setPosts(function(prev){return prev.filter(function(po){return po.id!==payload.old.id;});});
      })
      .on("postgres_changes",{event:"UPDATE",schema:"public",table:"posts"},function(payload){
        var rest=Object.assign({},payload.new);delete rest.like_count;
        setPosts(function(prev){return prev.map(function(po){return po.id===payload.new.id?Object.assign({},po,rest):po;});});
        setSelPost(function(prev){return prev&&prev.id===payload.new.id?Object.assign({},prev,rest):prev;});
      })
      .subscribe();
    loadLikes();
    return function(){sb.removeChannel(ch);};
  },[]);

  function loadPosts(){
    setFetching(true);
    sb.from("posts").select("*").order("created_at",{ascending:false}).limit(50).then(function(r){
      if(r.data)setPosts(r.data);
      setFetching(false);
    });
  }

  function loadLikes(){
    sb.from("post_likes").select("post_id").eq("user_id",p.user.id).then(function(r){
      if(r.data){var m={};r.data.forEach(function(l){m[l.post_id]=true;});setLikes(m);}
    });
  }

  function submitPost(){
    if(!title.trim()||submitting)return;
    setSubmitting(true);
    var name=(p.profile&&p.profile.display_name)||"Anonymous";
    var diagYear=(p.profile&&p.profile.diagnosis_year)||null;
    sb.from("posts").insert([{user_id:p.user.id,display_name:name,diagnosis_year:diagYear,title:title.trim(),body:body.trim()}]).then(function(r){
      setSubmitting(false);
      if(!r.error){setTitle("");setBody("");setNewPost(false);}

    h("div",{className:"gcard",style:{maxWidth:440,width:"100%",padding:"30px 32px"}},
      h("div",{style:{fontFamily:"Space Grotesk",fontSize:11,fontWeight:600,letterSpacing:".12em",textTransform:"uppercase",color:"#3b82f6",marginBottom:8}},"WHAT'S NEW · v"+CURRENT_VERSION),
      h("h2",{style:{fontFamily:"Space Grotesk",fontSize:21,fontWeight:700,color:"#f0f4ff",letterSpacing:"-.02em",marginBottom:18}},"What's New in UrgeTrack"),

      ),

    )

var TOUR_STEPS=[
  {target:"log",text:"Tap here to log a tic. Takes under 10 seconds."},
  {target:"analytics",text:"See your patterns after a few logs."},
  {target:"calm",text:"Games and breathing exercises to redirect urge energy."},
  {target:"discuss",text:"Connect with others who get it."},
];
function OnboardingTour(p){
  var ss=useState(0);var step=ss[0],setStep=ss[1];
  var rs=useState(null);var rect=rs[0],setRect=rs[1];

  function finish(){
    sb.from("profiles").update({toured:true}).eq("id",p.user.id).then(function(){});
    p.setProfile(function(prev){return Object.assign({},prev,{toured:true});});
  }
  function next(){if(step<TOUR_STEPS.length-1)setStep(function(s){return s+1;});else finish();}

  useEffect(function(){
    function measure(){
      var els=document.querySelectorAll('[data-tour="'+TOUR_STEPS[step].target+'"]');
      var found=null;
      els.forEach(function(e){var r=e.getBoundingClientRect();if(r.width>0&&r.height>0)found=r;});
      if(found)setRect(found);
      else if(step<TOUR_STEPS.length-1)setStep(function(s){return s+1;});
      else finish();
    }
    measure();
    window.addEventListener("resize",measure);
    return function(){window.removeEventListener("resize",measure);};
  },[step]);

  if(!rect)return null;
  var cur=TOUR_STEPS[step];
  var cy=rect.top+rect.height/2;
  var onMobile=rect.bottom>window.innerHeight-100;
  var cardTop=onMobile?Math.max(14,rect.top-150):Math.max(14,cy-50);
  var cardLeft=onMobile?Math.max(14,rect.left-100):rect.right+14;

  return h("div",{style:{position:"fixed",inset:0,zIndex:9999,pointerEvents:"none"}},
    h("div",{className:"tour-ring",style:{left:rect.left+rect.width/2-20,top:cy-20,width:40,height:40}}),
    h("div",{style:{position:"fixed",left:cardLeft,top:cardTop,width:240,background:"rgba(10,15,30,0.97)",border:"1px solid rgba(59,130,246,0.4)",borderRadius:12,padding:"16px 18px",pointerEvents:"auto",boxShadow:"0 8px 30px rgba(0,0,0,0.45)"}},
      !onMobile&&h("div",{style:{position:"absolute",left:-6,top:46,width:0,height:0,borderTop:"6px solid transparent",borderBottom:"6px solid transparent",borderRight:"6px solid rgba(10,15,30,0.97)"}}),
      h("div",{style:{fontSize:10,color:"#475569",letterSpacing:".08em",marginBottom:6}},"STEP "+(step+1)+" OF "+TOUR_STEPS.length),
      h("div",{style:{fontSize:13,color:"#e2e8f0",lineHeight:1.5,marginBottom:14}},cur.text),
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("a",{onClick:finish,style:{fontSize:11,color:"#475569",cursor:"pointer"}},"Skip tour"),
        h("button",{className:"btnp",onClick:next,style:{padding:"6px 16px",fontSize:12}},step<TOUR_STEPS.length-1?"Next":"Got it")
      )
    )
  );
}
function App(){
  var ds=useState(true);var isDark=ds[0],setIsDark=ds[1];
  var us=useState(null);var user=us[0],setUser=us[1];
  var pgs=useState("dash");var page=pgs[0],setPage=pgs[1];
  var ens=useState([]);var entries=ens[0],setEntries=ens[1];
  var prs=useState(null);var profile=prs[0],setProfile=prs[1];
  var lding=useState(true);var loading=lding[0],setLoading=lding[1];
  var wns=useState(false);var showWhatsNew=wns[0],setShowWhatsNew=wns[1];

  useEffect(function(){
    sb.auth.getSession().then(function(r){
      if(r.data.session){
        setUser(r.data.session.user);loadData(r.data.session.user.id);
        if(localStorage.getItem("urgetrack_seen_version")!==CURRENT_VERSION)setShowWhatsNew(true);
      }
      else setLoading(false);
    });
    var sub=sb.auth.onAuthStateChange(function(_event,session){
      if(session){setUser(session.user);}
      else{setUser(null);setEntries([]);setProfile(null);setLoading(false);}
    });
    return function(){if(sub&&sub.data&&sub.data.subscription)sub.data.subscription.unsubscribe();};
  },[]);

  function loadData(uid){
    setLoading(true);
    Promise.all([
      sb.from("entries").select("*").eq("user_id",uid).order("ts",{ascending:false}).limit(500),
      sb.from("profiles").select("*").eq("id",uid).single()
    ]).then(function(results){
      if(results[0].data)setEntries(results[0].data);
      if(results[1].data)setProfile(results[1].data);
      setLoading(false);
    });
  }
  function toggleTheme(){setIsDark(function(d){document.body.classList.toggle("light",d);return!d;});}
  function handleAuth(u){
    setUser(u);loadData(u.id);
    if(localStorage.getItem("urgetrack_seen_version")!==CURRENT_VERSION)setShowWhatsNew(true);
  }
  function signOut(){sb.auth.signOut().then(function(){setUser(null);setEntries([]);setProfile(null);});}

  if(loading)return h("div",{style:{height:"100vh",overflow:"hidden",position:"relative",zIndex:10}},h(DashSkeleton,null));
  if(!user) return h(AuthScreen, {onAuth: handleAuth});

  if(user&&profile!==null&&!profile.display_name&&!profile._onboarded)return h(OnboardingPage,{user:user,profile:profile,setProfile:setProfile,onDone:function(){setProfile(function(p){return Object.assign({},p,{_onboarded:true});});}});

  var cur;
  if(page==="dash")cur=h(DashPage,{key:"dash",entries:entries,profile:profile,user:user,setEntries:setEntries});
  else if(page==="log")cur=h(LogPage,{key:"log",user:user,entries:entries,setEntries:setEntries});
  else if(page==="analytics")cur=h(AnalyticsPage,{key:"analytics",entries:entries});
  else if(page==="journal")cur=h(SeverityJournal,{key:"journal",entries:entries,user:user,setEntries:setEntries});
  else if(page==="heatmap")cur=h(HeatmapPage,{key:"heatmap",entries:entries});
  else if(page==="report")cur=h(ReportPage,{key:"report",entries:entries,profile:profile});
  else if(page==="calm")cur=h(CalmPage,{key:"calm"});
  else if(page==="discuss")cur=h(DiscussPage,{key:"discuss",user:user,profile:profile});
  else if(page==="resources")cur=h(ResourcesPage,{key:"resources"});
  else if(page==="profile")cur=h(ProfilePage,{key:"profile",user:user,entries:entries,profile:profile,setProfile:setProfile});
  else if(page==="settings")cur=h(SettingsPage,{key:"settings",user:user,profile:profile,setProfile:setProfile,entries:entries,setEntries:setEntries,onToggleTheme:toggleTheme,onSignOut:signOut,isDark:isDark});

  return h("div",{className:"app"},
    h(Sidebar,{page:page,setPage:setPage,onSignOut:signOut,onToggleTheme:toggleTheme,isDark:isDark}),
    h("div",{className:"main"},cur),
    h(BottomNav,{page:page,setPage:setPage}),
    page==="dash"&&profile&&!profile.toured&&h(OnboardingTour,{key:"tour",user:user,setProfile:setProfile}),
    showWhatsNew&&h(WhatsNewModal,{key:"whatsnew",onClose:function(){localStorage.setItem("urgetrack_seen_version",CURRENT_VERSION);setShowWhatsNew(false);}})
  );
}

RD.createRoot(document.getElementById("root")).render(h(App,null));
})();
